<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bosala · Focus</title>
<style>
  :root{--navy:#0a2540;--teal:#1fb6a6;--teal-glow:rgba(31,182,166,.55);--amber:#e8a13a;--track:rgba(255,255,255,.09);}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:rgba(31,182,166,.25);}
  html,body{height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
    background:radial-gradient(120% 90% at 50% -10%,#12385f 0%,var(--navy) 55%,#071a2e 100%);
    color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;position:relative;transition:background .8s ease;}
  body.brk{background:radial-gradient(120% 90% at 50% -10%,#14463f 0%,#0c2e2a 55%,#06201d 100%);}
  .brand{position:absolute;top:26px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:10px;font-weight:700;font-size:18px;opacity:.92;}
  .compass{width:26px;height:26px;border-radius:50%;border:2.5px solid var(--teal);position:relative;}
  .compass::before{content:"";position:absolute;top:50%;left:50%;width:2.5px;height:10px;background:var(--teal);transform:translate(-50%,-90%) rotate(38deg);transform-origin:bottom center;border-radius:2px;}
  .compass::after{content:"";position:absolute;top:50%;left:50%;width:2.5px;height:8px;background:#fff;transform:translate(-50%,-8%) rotate(38deg);transform-origin:top center;border-radius:2px;}
  .brand small{font-weight:500;opacity:.55;font-size:12px;letter-spacing:2px;}
  .phase{font-weight:600;font-size:15px;letter-spacing:3px;text-transform:uppercase;color:var(--teal);margin-bottom:26px;height:20px;transition:color .5s;}
  body.brk .phase{color:var(--amber);}
  .stage{position:relative;width:min(78vw,340px);height:min(78vw,340px);display:flex;align-items:center;justify-content:center;}
  svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg);}
  .trk{fill:none;stroke:var(--track);stroke-width:10;}
  .prg{fill:none;stroke:var(--teal);stroke-width:10;stroke-linecap:round;filter:drop-shadow(0 0 10px var(--teal-glow));transition:stroke .5s;}
  body.brk .prg{stroke:var(--amber);}
  .time{font-weight:800;font-size:clamp(52px,15vw,76px);font-variant-numeric:tabular-nums;line-height:1;text-align:center;}
  .time .sub{display:block;font-weight:500;font-size:13px;letter-spacing:2px;opacity:.5;margin-top:10px;}
  .controls{display:flex;gap:14px;margin-top:40px;flex-wrap:wrap;justify-content:center;}
  button{font-family:inherit;font-weight:600;font-size:16px;border:none;border-radius:100px;padding:16px 34px;color:#fff;background:rgba(255,255,255,.08);touch-action:manipulation;cursor:pointer;-webkit-user-select:none;user-select:none;transition:transform .12s;}
  button:active{transform:scale(.94);}
  #startBtn{background:var(--teal);color:var(--navy);padding:16px 40px;box-shadow:0 8px 24px rgba(31,182,166,.35);}
  body.brk #startBtn{background:var(--amber);}
  .sessions{margin-top:34px;display:flex;flex-direction:column;align-items:center;gap:12px;}
  .dots{display:flex;gap:11px;}
  .dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.16);transition:all .4s;}
  .dot.done{background:var(--teal);box-shadow:0 0 10px var(--teal-glow);}
  .dot.active{background:#fff;transform:scale(1.15);}
  .count{font-size:12.5px;letter-spacing:1.5px;opacity:.55;font-weight:500;}
  .together{position:absolute;bottom:22px;left:0;right:0;text-align:center;font-size:12px;letter-spacing:1px;opacity:.4;font-weight:500;padding:0 20px;}
</style>
</head>
<body>
  <div id="__err" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#c0392b;color:#fff;font:13px/1.4 -apple-system,sans-serif;padding:10px 14px;white-space:pre-wrap;"></div>
  <div id="__tap" style="position:fixed;bottom:4px;left:0;right:0;text-align:center;font:11px -apple-system,sans-serif;color:#1fb6a6;z-index:9999;">taps: 0</div>
  <div class="brand"><span class="compass"></span>bosala <small>FOCUS</small></div>
  <div class="phase" id="phase">Ready to focus</div>
  <div class="stage" id="stage">
    <svg viewBox="0 0 100 100"><circle class="trk" cx="50" cy="50" r="45"></circle><circle class="prg" id="prg" cx="50" cy="50" r="45" stroke-dasharray="282.74" stroke-dashoffset="0"></circle></svg>
    <div class="time"><span id="time">50:00</span><span class="sub" id="sub">50 minutes</span></div>
  </div>
  <div class="controls">
    <button id="startBtn" type="button" onclick="TOGGLE()">Start focus</button>
    <button id="resetBtn" type="button" onclick="RESET()">Reset</button>
    <button id="skipBtn" type="button" onclick="SKIP()">Skip</button>
  </div>
  <div class="sessions"><div class="dots" id="dots"></div><div class="count" id="count">Session 1 of 3 · 0 done</div></div>
  <div class="together">Everyone in the group is focusing on this same timer right now.</div>

<script>
  (function(){
    function showErr(msg){var e=document.getElementById('__err');if(e){e.style.display='block';e.textContent='ERROR: '+msg;}}
    window.onerror=function(m,src,ln,col,err){showErr(m+' @line '+ln);return false;};
    window.addEventListener('error',function(ev){showErr((ev.message||ev.type)+' ');});
  })();
  var FOCUS=50*60, BREAK=10*60, TOTAL=3, CIRC=282.74;
  var mode='focus', remaining=FOCUS, running=false, started=false, sessionIndex=0, completed=0;
  var raf=null, endAt=0;

  var phase=document.getElementById('phase'), timeEl=document.getElementById('time'),
      sub=document.getElementById('sub'), prg=document.getElementById('prg'),
      stage=document.getElementById('stage'), startBtn=document.getElementById('startBtn'),
      dotsBox=document.getElementById('dots'), count=document.getElementById('count');

  var dots=[];
  for(var i=0;i<TOTAL;i++){var d=document.createElement('div');d.className='dot';dotsBox.appendChild(d);dots.push(d);}

  function fmt(s){s=Math.max(0,Math.round(s));var m=Math.floor(s/60),x=s%60;return (m<10?'0':'')+m+':'+(x<10?'0':'')+x;}

  function render(){
    timeEl.textContent=fmt(remaining);
    var total=mode==='focus'?FOCUS:BREAK;
    prg.style.strokeDashoffset=(CIRC*(1-remaining/total)).toFixed(2);
    phase.textContent=!started?'Ready to focus':(mode==='focus'?'Focus':'Break');
    sub.textContent=mode==='focus'?'stay with it':'rest your eyes';
    if(mode==='break'){document.body.classList.add('brk');}else{document.body.classList.remove('brk');}
    for(var i=0;i<TOTAL;i++){dots[i].className='dot'+(i<completed?' done':'')+((i===sessionIndex&&completed<TOTAL)?' active':'');}
    count.textContent=completed>=TOTAL?'All 3 sessions done':('Session '+(sessionIndex+1)+' of '+TOTAL+' · '+completed+' done');
    startBtn.textContent=running?'Pause':(remaining===(mode==='focus'?FOCUS:BREAK)?(mode==='focus'?'Start focus':'Start break'):'Resume');
  }

  // Date-based loop (survives iOS throttling far better than setInterval counting)
  function loop(){
    if(!running)return;
    remaining=(endAt-Date.now())/1000;
    if(remaining<=0){remaining=0;render();finishPhase();return;}
    render();
    raf=requestAnimationFrame(loop);
  }

  function startLoop(){endAt=Date.now()+remaining*1000;running=true;stage.classList.add('running');cancelAnimationFrame(raf);raf=requestAnimationFrame(loop);}
  function stopLoop(){running=false;stage.classList.remove('running');cancelAnimationFrame(raf);}

  function finishPhase(){
    stopLoop();
    if(mode==='focus'){
      completed=Math.min(completed+1,TOTAL);
      if(completed>=TOTAL){phase.textContent='Done — great work';render();return;}
      mode='break';remaining=BREAK;
    }else{
      sessionIndex=Math.min(sessionIndex+1,TOTAL-1);mode='focus';remaining=FOCUS;
    }
    prg.style.strokeDashoffset=0;render();startLoop();
  }

  var __taps=0;
  function __bump(){__taps++;var t=document.getElementById('__tap');if(t)t.textContent='taps: '+__taps;}
  function TOGGLE(){__bump();
    if(completed>=TOTAL)return;
    started=true;
    if(running){stopLoop();}else{startLoop();}
    render();
  }
  function RESET(){__bump();stopLoop();mode='focus';remaining=FOCUS;sessionIndex=0;completed=0;started=false;prg.style.strokeDashoffset=0;render();}
  function SKIP(){__bump();started=true;remaining=0.2;if(!running){startLoop();}else{endAt=Date.now()+200;}}

  document.addEventListener('keydown',function(e){if(e.key===' '||e.code==='Space'){e.preventDefault();TOGGLE();}});
  render();
</script>
</body>
</html>
